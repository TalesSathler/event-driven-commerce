<div class="flex min-h-screen items-center justify-center px-4">
  <z-card class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Sign In</h1>

    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div>
        <label for="email" class="text-sm font-medium">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="mt-1 block w-full rounded-lg border border-input bg-background px-3 py-2 text-sm ring-offset-background focus:outline-none focus:ring-2 focus:ring-ring"
          placeholder="john@example.com"
        />
      </div>

      <div>
        <label for="password" class="text-sm font-medium">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="mt-1 block w-full rounded-lg border border-input bg-background px-3 py-2 text-sm ring-offset-background focus:outline-none focus:ring-2 focus:ring-ring"
          placeholder="••••••••"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-destructive">{{ error() }}</p>
      }

      <button z-button type="submit" zFull="true" [zLoading]="loading()">
        Sign In
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-muted-foreground">
      Don't have an account?
      <a routerLink="/register" class="text-brand hover:underline">Register</a>
    </p>
  </z-card>
</div>
